<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服薬カレンダー</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; color: #333; }
        .status-card { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #dee2e6; }
        .check-mark { font-size: 50px; margin-bottom: 10px; }
        .history-list { text-align: left; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 10px; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; font-size: 14px; }
        .history-item:last-child { border-bottom: none; }
        #loading { color: #666; }
    </style>
</head>
<body>

    <h2>📅 服薬状況</h2>
    
    <div id="loading">データを読み込み中...</div>

    <div id="main-content" style="display:none;">
        <div class="status-card">
            <div id="check-icon" class="check-mark"></div>
            <div id="check-text" style="font-weight:bold; font-size:18px;"></div>
        </div>

        <h3>📝 最近の記録</h3>
        <div id="history-area" class="history-list"></div>
    </div>

    <script>
        // ★重要：ここにご自身の最新のGAS URLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";
        const LIFF_ID = "2009771327-tpjaCzG9"; 

        async function init() {
            try {
                // LIFFの初期化
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                
                // GASからデータ取得
                const response = await fetch(`${GAS_URL}?userId=${profile.userId}`);
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                // 今日の日付を取得 (yyyy-mm-dd形式)
                const now = new Date();
                const todayStr = now.getFullYear() + "-" + 
                                 ("0" + (now.getMonth() + 1)).slice(-2) + "-" + 
                                 ("0" + now.getDate()).slice(-2);

                // 今日のチェック表示
                const checkIcon = document.getElementById('check-icon');
                const checkText = document.getElementById('check-text');
                
                if (data.calendar && data.calendar.includes(todayStr)) {
                    checkIcon.innerHTML = "✅";
                    checkText.innerHTML = "本日は服用済みです";
                    checkText.style.color = "#28a745";
                } else {
                    checkIcon.innerHTML = "❌";
                    checkText.innerHTML = "本日の記録はありません";
                    checkText.style.color = "#dc3545";
                }

                // 履歴一覧表示
                const hArea = document.getElementById('history-area');
                if (data.history && data.history.length > 0) {
                    hArea.innerHTML = data.history.map(h => `<div class="history-item">${h}</div>`).join('');
                } else {
                    hArea.innerHTML = "記録がまだありません。";
                }

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = "エラーが発生しました: " + err;
            }
        }

        init();
    </script>
</body>
</html>
