    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";
    const LIFF_ID = "2009771327-tpjaCzG9"; 

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            
            const res = await fetch(`${GAS_URL}?userId=${profile.userId}`);
            const data = await res.json();

            // 1. 履歴の表示
            const hArea = document.getElementById('history-area');
            if (data.history.length > 0) {
                hArea.innerHTML = data.history.map(h => `<div class="history-item">${h}</div>`).join('');
            } else {
                hArea.innerHTML = "記録がまだありません。";
            }

            // 2. 今日のチェック表示
            const today = new Date();
            const todayStr = today.getFullYear() + "-" + 
                             ("0" + (today.getMonth() + 1)).slice(-2) + "-" + 
                             ("0" + today.getDate()).slice(-2);
            
            const cArea = document.getElementById('calendar-area');
            // data.calendar（日付配列）に今日の日付が含まれているかチェック
            if (data.calendar.includes(todayStr)) {
                cArea.innerHTML = '<div style="font-size:40px;">✅</div>本日服用済み';
            } else {
                cArea.innerHTML = '<div style="font-size:40px;">❌</div>未服用';
            }
        } catch (e) {
            document.getElementById('status').innerText = "エラー: " + e;
        }
    }
    init();
</script>
