<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服薬カレンダー</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f6; }
    #container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; display: none; }
    #calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .day { height: 60px; border: 1px solid #eee; border-radius: 8px; position: relative; padding-top: 5px; cursor: pointer; }
    .day-header { font-weight: bold; padding: 10px 0; }
    .has-record::after { content: '✅'; position: absolute; bottom: 5px; right: 5px; font-size: 1.1em; }
    .today { border: 2px solid #3498db; background: #ebf5fb; }
    #loading { text-align: center; margin-top: 100px; font-size: 1.1em; color: #666; }
    .btn-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    button { padding: 8px 15px; border: none; background: #3498db; color: white; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="loading">読み込み中...</div>
  <div id="container">
    <div class="btn-row">
      <button onclick="moveMonth(-1)">前月</button>
      <h3 id="month-label"></h3>
      <button onclick="moveMonth(1)">翌月</button>
    </div>
    <div id="calendar-grid">
      <div class="day-header">日</div><div class="day-header">月</div><div class="day-header">火</div>
      <div class="day-header">水</div><div class="day-header">木</div><div class="day-header">金</div><div class="day-header">土</div>
    </div>
    <div id="details" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px; display:none;">
      <h4 id="detail-date"></h4>
      <ul id="detail-list"></ul>
    </div>
  </div>

  <script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec"; // ★新しくデプロイしたURLに書き換え
    const liffId = "2009771241-wKEi2etS"; // ★カレンダー用のLIFF ID
    let current = new Date();
    let records = {};

    liff.init({ liffId }).then(() => {
      // NFCリンク経由（itemがある）なら即座に閉じて記録をGASに任せる
      const params = new URLSearchParams(window.location.search);
      if (params.has('item')) {
        liff.closeWindow();
        return;
      }
      if (!liff.isLoggedIn()) { liff.login(); } 
      else { liff.getProfile().then(p => fetchRecords(p.userId)); }
    });

    async function fetchRecords(uid) {
      try {
        const res = await fetch(`${gasUrl}?userId=${uid}`);
        records = await res.json();
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('container').style.display = 'block';
        render();
      }
    }

    function render() {
      const grid = document.getElementById('calendar-grid');
      const y = current.getFullYear();
      const m = current.getMonth();
      document.getElementById('month-label').textContent = `${y}年 ${m + 1}月`;
      document.querySelectorAll('.day').forEach(e => e.remove());

      const first = new Date(y, m, 1).getDay();
      const last = new Date(y, m + 1, 0).getDate();

      for (let i = 0; i < 42; i++) {
        const d = i - first + 1;
        const div = document.createElement('div');
        div.className = 'day';
        if (d > 0 && d <= last) {
          div.textContent = d;
          const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          if (records[key]) div.classList.add('has-record');
          if (new Date().toDateString() === new Date(y,m,d).toDateString()) div.classList.add('today');
          div.onclick = () => show(key);
        } else {
          div.style.visibility = 'hidden';
        }
        grid.appendChild(div);
      }
    }

    function show(key) {
      const d = document.getElementById('details');
      const l = document.getElementById('detail-list');
      l.innerHTML = '';
      if (records[key]) {
        document.getElementById('detail-date').textContent = key;
        records[key].forEach(r => {
          const li = document.createElement('li');
          li.textContent = `${r.time} - ${r.item}`;
          l.appendChild(li);
        });
        d.style.display = 'block';
      } else { d.style.display = 'none'; }
    }

    function moveMonth(n) { current.setMonth(current.getMonth() + n); render(); }
  </script>
</body>
</html>
