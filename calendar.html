<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服薬記録カレンダー</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
    #container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2c3e50; }
    #calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    #calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .day-header { font-weight: bold; background-color: #ecf0f1; padding: 10px; border-radius: 5px; }
    .day { position: relative; padding: 15px 0; border: 1px solid #e0e0e0; border-radius: 5px; cursor: pointer; height: 50px; }
    .today { background-color: #e3f2fd; font-weight: bold; border: 2px solid #3498db; }
    .other-month { color: #ccc; }
    .has-record::after { content: '✅'; position: absolute; bottom: 5px; right: 5px; font-size: 1.2em; }
    #details { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 10px; background-color: #fafafa; display: none; }
    #loading { text-align: center; margin-top: 100px; font-weight: bold; font-size: 1.2em; color: #7f8c8d; }
  </style>
</head>
<body>
  <div id="loading">データを読み込み中...</div>
  <div id="container" style="display: none;">
    <h2>服薬記録カレンダー</h2>
    <div id="calendar-header">
      <button onclick="changeMonth(-1)">前月</button>
      <div id="month-label"></div>
      <button onclick="changeMonth(1)">翌月</button>
    </div>
    <div id="calendar-grid">
      <div class="day-header">日</div><div class="day-header">月</div><div class="day-header">火</div>
      <div class="day-header">水</div><div class="day-header">木</div><div class="day-header">金</div><div class="day-header">土</div>
    </div>
    <div id="details">
      <h3 id="details-date"></h3>
      <ul id="details-list"></ul>
    </div>
    <div style="text-align: center; margin-top: 30px;">
      <a href="terms.html" style="color: #95a5a6; font-size: 12px;">利用規約</a>
    </div>
  </div>

  <script>
    // ★【重要】あなたの情報を入れてください
    const gasUrl = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";
    const liffId = "2009771327-ZlTtzNT6";

    let currentDate = new Date();
    let allRecords = {};

    liff.init({ liffId: liffId }).then(() => {
      if (!liff.isLoggedIn()) { liff.login(); } 
      else { liff.getProfile().then(p => loadRecords(p.userId)); }
    });

    async function loadRecords(userId) {
      try {
        const res = await fetch(`${gasUrl}?userId=${userId}`);
        allRecords = await res.json();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('container').style.display = 'block';
        renderCalendar();
      } catch (e) { document.getElementById('loading').innerText = "取得失敗。URLを確認してください。"; }
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('month-label').textContent = `${year}年 ${month + 1}月`;
      
      document.querySelectorAll('.day').forEach(el => el.remove());

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < 42; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        const dayNum = i - firstDay + 1;
        if (dayNum > 0 && dayNum <= daysInMonth) {
          dayDiv.textContent = dayNum;
          const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
          if (allRecords[dateKey]) dayDiv.classList.add('has-record');
          if (new Date().toDateString() === new Date(year, month, dayNum).toDateString()) dayDiv.classList.add('today');
          dayDiv.onclick = () => showDetails(dateKey);
        } else {
          dayDiv.classList.add('other-month');
        }
        grid.appendChild(dayDiv);
      }
    }

    function showDetails(key) {
      const list = document.getElementById('details-list');
      list.innerHTML = '';
      if (allRecords[key]) {
        document.getElementById('details-date').textContent = key;
        allRecords[key].forEach(r => {
          const li = document.createElement('li');
          li.textContent = `${r.time} - ${r.item}`;
          list.appendChild(li);
        });
        document.getElementById('details').style.display = 'block';
      }
    }

    function changeMonth(diff) {
      currentDate.setMonth(currentDate.getMonth() + diff);
      renderCalendar();
    }
  </script>
</body>
</html>
