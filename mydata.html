<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>身体データ・究極ログ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-grad: linear-gradient(135deg, #68d391 0%, #4fd1c5 100%); --bg: #f0f4f8; --text: #2d3748; }
        
        /* 修正ポイント：bodyのheight固定を解除し、自然なスクロールを許可 */
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            color: var(--text); 
            min-height: 100vh;
        }
        
        /* 修正ポイント：cardの高さをautoにして、中身に応じて伸びるようにする */
        .card { 
            background: white; 
            width: 100%; 
            max-width: 420px; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .header { background: var(--main-grad); color: white; padding: 20px 15px; text-align: center; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 800; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; background: #fff; border-bottom: 1px solid #eee; }
        .stat-card { background: #f8fafc; padding: 10px; border-radius: 15px; text-align: center; border: 1px solid #edf2f7; }
        .stat-label { font-size: 10px; color: #64748b; }
        .stat-value { font-size: 18px; font-weight: 800; color: #2d3748; }

        .chart-container { padding: 15px; background: #fff; border-bottom: 1px solid #f0f4f8; height: 180px; display: none; }
        
        /* 修正ポイント：ここをスクロールさせず、ページ全体でスクロールするように変更 */
        .history-section { padding: 15px 15px 100px; background: #fff; }
        
        .history-card { background: white; border: 1px solid #f1f5f9; border-radius: 18px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .date-badge { font-size: 11px; font-weight: 700; color: #94a3b8; }
        
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .d-label { font-size: 9px; color: #94a3b8; display: block; }
        .d-val { font-size: 13px; font-weight: 700; color: #475569; }
        
        .extra-row { display: flex; gap: 8px; margin-top: 10px; }
        .pill { flex: 1; padding: 6px; border-radius: 8px; font-size: 10px; text-align: center; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .report-box { margin-top: 10px; background: #fffaf0; border-radius: 10px; padding: 10px; font-size: 11px; border: 1px solid #fef3c7; line-height: 1.4; }

        #loader { padding: 100px 0; text-align: center; color: #4fd1c5; }
        .spinner { width: 35px; height: 35px; border: 4px solid #f3f3f3; border-top: 4px solid #4fd1c5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 id="user-name">📊 身体ログ</h1>
        <p id="sub-text" style="margin:5px 0 0; font-size:12px; opacity:0.9;">同期中...</p>
    </div>

    <div id="loader"><div class="spinner"></div><p>データを読み込んでいます...</p></div>

    <div id="content" style="display:none;">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">最新体重</div><div class="stat-value"><span id="v-w">--</span><small style="font-size:10px;">kg</small></div></div>
            <div class="stat-card"><div class="stat-label">体脂肪率</div><div class="stat-value"><span id="v-f">--</span><small style="font-size:10px;">%</small></div></div>
            <div class="stat-card"><div class="stat-label">筋肉量</div><div class="stat-value"><span id="v-m">--</span><small style="font-size:10px;">kg</small></div></div>
            <div class="stat-card"><div class="stat-label">水分率</div><div class="stat-value"><span id="v-wa">--</span><small style="font-size:10px;">%</small></div></div>
        </div>

        <div class="chart-container" id="chart-area">
            <canvas id="weightChart"></canvas>
        </div>

        <div class="history-section" id="history-list"></div>
    </div>
</div>

<script>
    const LIFF_ID = "2009771327-ZlTtzNT6"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            document.getElementById('sub-text').innerText = profile.displayName + " さんの履歴";

            // GASからデータ取得
            const response = await fetch(`${GAS_URL}?type=getVitalData&userId=${profile.userId}`);
            const data = await response.json();

            if (data && data.length > 0) {
                // サマリー反映
                const L = data[0];
                document.getElementById('v-w').innerText = L.weight || '--';
                document.getElementById('v-f').innerText = L.fat_pc || '--';
                document.getElementById('v-m').innerText = L.muscle || '--';
                document.getElementById('v-wa').innerText = L.water_pc || '--';

                // グラフ（直近20件くらいが見やすい）
                if (data.length >= 2) {
                    document.getElementById('chart-area').style.display = 'block';
                    drawChart(data.slice(0, 20));
                }

                // 履歴全件生成
                document.getElementById('history-list').innerHTML = data.map((item, i) => `
                    <div class="history-card">
                        <div class="history-header">
                            <span class="date-badge">📅 ${item.fullDate}</span>
                            <span style="font-size:10px; color:#4fd1c5; font-weight:bold;">#${data.length - i}</span>
                        </div>
                        <div class="data-grid">
                            <div class="data-item"><span class="d-label">体重</span><span class="d-val">${item.weight}kg</span></div>
                            <div class="data-item"><span class="d-label">体脂肪</span><span class="d-val">${item.fat_pc}%</span></div>
                            <div class="data-item"><span class="d-label">筋肉量</span><span class="d-val">${item.muscle}kg</span></div>
                            <div class="data-item"><span class="d-label">歩数</span><span class="d-val">${item.steps}</span></div>
                            <div class="data-item"><span class="d-label">水分</span><span class="d-val">${item.water_pc}%</span></div>
                            <div class="data-item"><span class="d-label">たんぱく</span><span class="d-val">${item.protein_pc}%</span></div>
                        </div>
                        <div class="extra-row">
                            <div class="pill">リブレ: ${item.libre || '--'}</div>
                            <div class="pill">血液: ${item.blood || '--'}</div>
                        </div>
                        ${item.report ? `<div class="report-box">${item.report}</div>` : ''}
                    </div>
                `).join('');

                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                document.getElementById('loader').innerText = "データが見つかりません";
            }
        } catch (e) { 
            document.getElementById('loader').innerText = "通信エラーが発生しました"; 
            console.error(e);
        }
    }

    function drawChart(recentData) {
        const ctx = document.getElementById('weightChart').getContext('2d');
        const revData = [...recentData].reverse();
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: revData.map(d => d.date),
                datasets: [{
                    data: revData.map(d => d.weight),
                    borderColor: '#4fd1c5',
                    backgroundColor: 'rgba(79, 209, 197, 0.1)',
                    fill: true, tension: 0.4, borderWidth: 3, pointRadius: 2, pointBackgroundColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: false, grid: { color: '#f0f4f8' } }, 
                    x: { grid: { display: false } } 
                }
            }
        });
    }
    window.onload = init;
</script>
</body>
</html>
