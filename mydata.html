<script>
    const LIFF_ID = "2009771327-ZlTtzNT6"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            document.getElementById('user-name').innerText = profile.displayName + " さんの記録";

            // 自分のユーザーIDを投げて、C列にそのIDがある行だけを抽出してもらう
            const res = await fetch(`${GAS_URL}?type=getVitalData&userId=${profile.userId}`);
            const data = await res.json();

            if (data && data.length > 0) {
                const latest = data[0]; // 最新の1件
                document.getElementById('v-w').innerHTML = `${latest.weight || '--'}<span class="unit">kg</span>`;
                document.getElementById('v-fr').innerHTML = `${latest.fat_pc || '--'}<span class="unit">%</span>`;
                document.getElementById('v-fm').innerHTML = `${latest.fat_kg || '--'}<span class="unit">kg</span>`;
                document.getElementById('v-m').innerHTML = `${latest.muscle || '--'}<span class="unit">kg</span>`;

                document.getElementById('history-list').innerHTML = data.map(h => `
                    <div class="history-item">
                        <span class="history-date">${h.date}</span>
                        <span>${h.weight}kg / ${h.muscle}kg</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('history-list').innerText = "まだ記録がありません。";
            }
            document.getElementById('loader').style.display = "none";
            document.getElementById('main-content').style.display = "block";
        } catch (e) { 
            document.getElementById('loader').innerText = "データ取得エラー"; 
        }
    }
    init();
</script>
