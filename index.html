<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Loggy-System</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #4a5568; }
        .loader { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #764ba2; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div id="msg">データを送信中...</div>
    </div>
<script>
    const LIFF_ID_RECORD = "2009771327-tpjaCzG9"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";

    window.onload = async () => {
        try {
            // URLから即座にパラメータを抽出
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('item');

            // 【重要】抽出したら即座にURLからパラメータを消去（履歴に残さない）
            if (window.history.replaceState) {
                window.history.replaceState(null, null, window.location.pathname);
            }

            if (!itemId || itemId === "undefined") {
                document.getElementById('msg').innerText = "エラー: IDが正しくありません。再度読み込んでください。";
                return;
            }

            await liff.init({ liffId: LIFF_ID_RECORD });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();

            // GASのURLにタイムスタンプを付与（キャッシュ回避）
            const finalGasUrl = GAS_URL + "?t=" + new Date().getTime();

            // GASへ記録データを送信
            await fetch(finalGasUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({
                    userId: profile.userId,
                    item: itemId
                })
            });

            // 成功メッセージ表示（安心感のため）
            document.getElementById('msg').innerText = "記録しました！閉じます...";

            // 通信完了後の待機時間を少し確保して閉じる
            setTimeout(() => {
                liff.closeWindow(); 
            }, 800);

        } catch (err) {
            document.getElementById('msg').innerText = "エラーが発生しました: " + err.message;
            console.error(err);
        }
    };
</script>
</body>
</html>
