<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loggy-System</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { text-align: center; color: #764ba2; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loader" id="msg">記録中...</div>
<script>
    const LIFF_ID_RECORD = "2009771327-tpjaCzG9"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";

    window.onload = async () => {
        try {
            // 1. LIFF初期化を確実に待つ
            await liff.init({ liffId: LIFF_ID_RECORD });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            // 2. 自分のプロフィールとURLパラメータを取得
            const profile = await liff.getProfile();
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('item');

            if (itemId) {
                // 3. GASへ送信（タイムスタンプ付きでキャッシュ回避）
                await fetch(`${GAS_URL}?t=${Date.now()}`, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        userId: profile.userId,
                        item: itemId
                    })
                });

                document.getElementById('msg').innerText = "記録完了！";
                
                // 4. 送信後、一瞬待って閉じる
                setTimeout(() => { liff.closeWindow(); }, 500);
            } else {
                document.getElementById('msg').innerText = "エラー：IDが見つかりません";
            }
        } catch (err) {
            document.getElementById('msg').innerText = "エラーが発生しました";
            console.error(err);
        }
    };
</script>
</body>
</html>
