<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記録中</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div style="text-align:center; margin-top:50px;">記録しています...</div>
    <script>
        const LIFF_ID = "2009771327-tpjaCzG9"; // 「記録用ユニット」のID

        liff.init({ liffId: LIFF_ID }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('item');
            if (id) {
                liff.sendMessages([{ type: 'text', text: 'item=' + id }])
                    .then(() => liff.closeWindow())
                    .catch(err => {
                        // ここでエラーが出たら画面に表示する
                        document.body.innerHTML = "送信失敗: " + err.message;
                    });
            }
        });
    </script>
</body>
</html>
