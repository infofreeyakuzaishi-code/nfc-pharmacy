<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>記録中</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div style="text-align:center; margin-top:50px;">記録しています...</div>
    <script>
        const LIFF_ID = "2009757402-6XKBiLYl";
        liff.init({ liffId: LIFF_ID }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const id = new URLSearchParams(window.location.search).get('item');
            if (id) {
                liff.sendMessages([{ type: 'text', text: 'item=' + id }])
                    .then(() => liff.closeWindow())
                    .catch(err => alert("トーク画面で開いてください"));
            }
        });
    </script>
</body>
</html>
