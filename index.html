<script>
    const LIFF_ID = "2009771327-tpjaCzG9"; // さきほどの新しいID
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec"; // ★ここに最新の/execを貼る

    async function start() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('item');

            if (itemId) {
                // LINEに喋らせるのではなく、直接GASにデータを送る
                await fetch(`${GAS_URL}?userId=${profile.userId}&item=${itemId}`, {
                    mode: 'no-cors' // これでおまじない的に通信を通します
                });
                
                // 完了したら即座に閉じる
                liff.closeWindow();
            }
        } catch (err) {
            alert("エラー: " + err);
        }
    }
    start();
</script>
