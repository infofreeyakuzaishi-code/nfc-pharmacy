<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>服用ログ記録中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <p>記録しています。少々お待ちください...</p>

    <script>
        async function main() {
            try {
                await liff.init({ liffId: "https://miniapp.line.me/2009757402-6XKBiLYl" }); // ここはあなたのIDに
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                
                // 送信を試みる（成否にかかわらず進むように設定）
                fetch("https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec", {
                    method: "POST",
                    mode: 'no-cors', // これを入れるとエラーで止まりにくくなります
                    body: JSON.stringify({
                        userId: profile.userId,
                        item: "マルチビタミン"
                    })
                });

                // 2秒だけ待ってから閉じる（安心感のため）
                setTimeout(() => {
                    liff.closeWindow();
                }, 2000);

            } catch (error) {
                // エラーが起きてもとりあえず3秒で閉じる
                setTimeout(() => {
                    liff.closeWindow();
                }, 3000);
            }
        }
        main();
    </script>
</body>
</html>
