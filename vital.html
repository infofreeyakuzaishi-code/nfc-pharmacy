<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体組成・身体データ入力</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; color: #2d3748; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { font-size: 20px; text-align: center; color: #764ba2; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #718096; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: #764ba2; outline: none; background: #fefaff; }

        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.98); opacity: 0.9; }

        /* 送信完了後のスタイル */
        #success-msg { display: none; text-align: center; margin-top: 20px; animation: fadeIn 0.5s ease-in-out; }
        .line-btn { display: inline-block; width: 100%; padding: 16px; background-color: #06C755; color: white; text-decoration: none; border-radius: 15px; font-weight: bold; margin-top: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <h2>⚖️ 身体データ入力</h2>
    
    <div class="input-group">
        <label>体重 (kg)</label>
        <input type="number" id="weight" step="0.1" placeholder="65.0">
    </div>
    
    <div class="input-group">
        <label>体脂肪率 (%)</label>
        <input type="number" id="fat_pc" step="0.1" placeholder="15.0">
    </div>

    <div class="input-group">
        <label>筋肉量 (kg)</label>
        <input type="number" id="muscle" step="0.1" placeholder="50.0">
    </div>

    <div class="input-group">
        <label>歩数 (steps)</label>
        <input type="number" id="steps" placeholder="8000">
    </div>

    <div class="input-group">
        <label>運動・メモ</label>
        <textarea id="exercise" rows="2" placeholder="ウォーキング30分 など"></textarea>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="submitData()">データを送信する</button>

    <div id="success-msg">
        <p style="font-weight: bold; color: #48bb78;">✅ 送信が完了しました！</p>
        <p style="font-size: 14px; color: #718096;">LINE通知を確認してください。</p>
        <a href="https://lin.ee/7COjqzB" class="line-btn">LINEへ戻る</a>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";

    async function init() {
        await liff.init({ liffId: "2009771327-tpjaCzG9" });
    }

    async function submitData() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "送信中...";
        btn.disabled = true;

        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();

        const data = {
            type: "vital_record",
            userId: profile.userId,
            weight: document.getElementById('weight').value,
            fat_pc: document.getElementById('fat_pc').value,
            muscle: document.getElementById('muscle').value,
            steps: document.getElementById('steps').value,
            exercise: document.getElementById('exercise').value
        };

        try {
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });

            // 入力フォームを隠して完了メッセージを表示
            document.querySelectorAll('.input-group').forEach(el => el.style.display = 'none');
            btn.style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            
        } catch (e) {
            alert("エラーが発生しました。");
            btn.disabled = false;
            btn.innerText = "データを送信する";
        }
    }

    init();
</script>

</body>
</html>
