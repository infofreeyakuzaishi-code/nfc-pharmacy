<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身体データ入力</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* スムーズスクロールを有効化 */
        html { scroll-behavior: smooth; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 15px; color: #2d3748; margin: 0; }
        .form-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        h2 { text-align: center; color: #764ba2; font-size: 20px; margin-bottom: 25px; }
        h3 { border-left: 4px solid #764ba2; padding-left: 12px; font-size: 15px; margin: 25px 0 15px; color: #4a5568; background: #f8f9fa; padding-top: 5px; padding-bottom: 5px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: bold; color: #718096; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; transition: 0.2s; }
        
        /* 送信ボタン */
        .btn-submit { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: bold; margin-top: 20px; font-size: 18px; cursor: pointer; transition: all 0.3s; }
        .btn-submit.completed { background: #a0aec0 !important; cursor: default; transform: scale(1); }
        
        /* 完了後のエリア：はみ出し防止のためbox-sizingを徹底 */
        #after-submit { 
            display: none; 
            text-align: center; 
            margin-top: 25px; 
            padding: 20px;
            border-radius: 20px;
            background: #ffffff;
            border: 2px solid #06C755;
            box-sizing: border-box; /* はみ出し防止 */
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .line-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 16px 0; /* 左右パディングを0にして幅を安定させる */
            background-color: #06C755; 
            color: white; 
            text-decoration: none; 
            border-radius: 16px; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 15px;
            box-sizing: border-box; /* はみ出し防止 */
            box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3);
        }
        
        /* ふわっとしたアニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* スクロール用の余白（一番下までスクロールしやすくするため） */
        .spacer { height: 50px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>📊 身体データ入力</h2>
        
        <h3>【体組成】</h3>
        <div class="input-group"><label>体重 (kg)</label><input type="number" id="weight" step="0.1" placeholder="例: 65.2"></div>
        <div class="input-group"><label>体脂肪率 (%)</label><input type="number" id="fat_pc" step="0.1" placeholder="例: 18.5"></div>
        <div class="input-group"><label>体脂肪量 (kg)</label><input type="number" id="fat_kg" step="0.1" placeholder="例: 12.0"></div>
        <div class="input-group"><label>筋肉量 (kg)</label><input type="number" id="muscle" step="0.1" placeholder="例: 50.1"></div>
        
        <div class="input-group">
            <label>水分率(%) / 量(kg)</label>
            <div style="display:flex; gap:8px;">
                <input type="number" id="water_pc" step="0.1" placeholder="%">
                <input type="number" id="water_kg" step="0.1" placeholder="kg">
            </div>
        </div>
        
        <div class="input-group">
            <label>たんぱく率(%) / 量(kg)</label>
            <div style="display:flex; gap:8px;">
                <input type="number" id="protein_pc" step="0.1" placeholder="%">
                <input type="number" id="protein_kg" step="0.1" placeholder="kg">
            </div>
        </div>

        <h3>【身体データ】</h3>
        <div class="input-group"><label>歩数</label><input type="number" id="steps" placeholder="例: 8000"></div>
        <div class="input-group"><label>リブレ数値</label><input type="number" id="libre" placeholder="例: 110"></div>
        <div class="input-group"><label>血液検査値</label><textarea id="blood" rows="2" placeholder="気になる数値があれば"></textarea></div>
        <div class="input-group"><label>運動報告</label><textarea id="exercise" rows="2" placeholder="散歩30分 など"></textarea></div>

        <button class="btn-submit" id="submit-btn" onclick="submitData()">データを記録する</button>

        <div id="after-submit">
            <p style="font-weight: bold; color: #2d3748; margin: 0;">✅ 記録を送信しました</p>
            <p style="font-size: 13px; color: #718096; margin: 5px 0 0;">LINE通知を確認してください。</p>
            <a href="https://lin.ee/7COjqzB" class="line-btn">LINEへ戻る</a>
        </div>
        
        <div class="spacer"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec";

        liff.init({ liffId: "2009771327-tpjaCzG9" }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); }
        });

        async function submitData() {
            const btn = document.getElementById('submit-btn');
            const afterMsg = document.getElementById('after-submit');
            
            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                const context = await liff.getContext();
                const userId = context.userId;

                const payload = {
                    type: "vital_record",
                    userId: userId,
                    weight: document.getElementById('weight').value,
                    fat_pc: document.getElementById('fat_pc').value,
                    fat_kg: document.getElementById('fat_kg').value,
                    muscle: document.getElementById('muscle').value,
                    water_pc: document.getElementById('water_pc').value,
                    water_kg: document.getElementById('water_kg').value,
                    protein_pc: document.getElementById('protein_pc').value,
                    protein_kg: document.getElementById('protein_kg').value,
                    steps: document.getElementById('steps').value,
                    libre: document.getElementById('libre').value,
                    blood: document.getElementById('blood').value,
                    exercise: document.getElementById('exercise').value
                };

                fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(payload)
                });

                // 演出
                btn.classList.add('completed');
                btn.innerText = "送信完了";
                
                // 表示
                afterMsg.style.display = 'block';

                // より「ふわっ」とスクロールさせるための調整
                // 要素が現れてから少し待って、中心にくるようにスクロール
                setTimeout(() => {
                    afterMsg.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'center' // 画面の真ん中に持ってくることで余裕を持たせる
                    });
                }, 400);

            } catch (e) {
                alert("エラーが発生しました。");
                btn.disabled = false;
                btn.innerText = "再試行";
            }
        }
    </script>
</body>
</html>
