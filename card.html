<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ろぎてむ 管理カード</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 95%; max-width: 420px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; position: relative; padding-bottom: 10px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; }
        
        /* ① 案内文エリアの復活 */
        .guide-box { background: #f8faff; margin: 15px 20px; padding: 15px; border-radius: 12px; border-left: 4px solid #667eea; font-size: 12px; color: #4a5568; line-height: 1.6; }
        .guide-box strong { color: #667eea; font-size: 13px; }
        .guide-box ul { margin: 5px 0 0; padding-left: 18px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px 20px; }
        .menu-item { background: #fff; border: 2px solid #edf2f7; border-radius: 18px; padding: 15px 10px; text-align: center; transition: 0.2s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100px; }
        .menu-item.active { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.1); }
        .icon { font-size: 28px; margin-bottom: 5px; }
        .label { font-size: 13px; font-weight: bold; color: #2d3748; }
        .sub-label { font-size: 9px; opacity: 0.7; display: block; margin-top: 2px; }

        .stamp-section { padding: 0 20px 15px; text-align: center; }
        .stamp-title { font-size: 11px; font-weight: bold; color: #718096; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .stamp-grid { display: flex; justify-content: center; gap: 10px; }
        .stamp-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stamp-btn.visible { display: flex; }

        .ad-container { padding: 5px 20px; text-align: center; }
        .ad-banner-wrapper { position: relative; width: 100%; height: 70px; border-radius: 12px; overflow: hidden; background: #eee; }
        .ad-banner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: 0.8s; display: none; align-items: center; justify-content: center; text-decoration: none; }
        .ad-banner.active { opacity: 1; display: flex; }
        .status-panel { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); color: white; flex-direction: column; }

        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 10; font-weight: bold; color: #667eea; }
    </style>
</head>
<body>

<div class="card">
    <div id="loader">読み込み中...</div>
    <div class="header">
        <h1>ろぎてむ/Loggy/</h1>
        <p>ID: <span id="display-id">----</span></p>
    </div>

    <div class="guide-box">
        <strong>【ご利用ガイド】</strong>
        <ul>
            <li><strong>新規登録：</strong> 空きボタンを押し、名前と回数を送信。</li>
            <li><strong>設定変更：</strong> トーク画面で「設定確認」と送信。</li>
            <li><strong>体調報告：</strong> 下の顔をタップ。継続で種類が変化！</li>
        </ul>
    </div>

    <div class="stamp-section">
        <div class="stamp-title"><span>体調報告</span> <span id="stamp-count-text">累計 0回</span></div>
        <div class="stamp-grid">
            <button class="stamp-btn visible" onclick="sendToOA('😊')">😊</button>
            <button class="stamp-btn visible" onclick="sendToOA('😑')">😑</button>
            <button class="stamp-btn visible" onclick="sendToOA('😫')">😫</button>
            <button id="st-fire" class="stamp-btn" onclick="sendToOA('🔥')">🔥</button>
            <button id="st-crown" class="stamp-btn" onclick="sendToOA('👑')">👑</button>
        </div>
    </div>

    <div class="menu-grid" id="menu-grid">
        <div id="slot-0" class="menu-item"><div class="icon">💊</div><div class="label">読み込み中</div></div>
        <div id="slot-1" class="menu-item"><div class="icon">💊</div><div class="label">読み込み中</div></div>
        <div id="slot-2" class="menu-item"><div class="icon">💊</div><div class="label">読み込み中</div></div>
        <div id="slot-3" class="menu-item"><div class="icon">💊</div><div class="label">読み込み中</div></div>
    </div>

    <div class="ad-container">
        <div class="ad-banner-wrapper" id="ad-wrapper">
            <div class="ad-banner status-panel active">
                <div style="font-size: 10px;">現在の継続ランク</div>
                <div style="font-size: 18px; font-weight: bold;" id="rank-name">ビギナー</div>
            </div>
            <div class="ad-banner status-panel">
                <div style="font-size: 12px;">いつもご利用ありがとうございます</div>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_ulkMQbEh0DPGJtBi94sUsN4BnJmXVJU9zTdA_t8Cp3L1tPBc3k2Y3tigHdv-Es_G/exec"; 
    const LIFF_URL = "https://liff.line.me/2009771327-tpjaCzG9";
    const LINE_OA = "https://line.me/R/oaMessage/@534uoyka/?";

    // スタンプ用：LINEのトークにメッセージを送る
    function sendToOA(txt) { window.location.href = LINE_OA + encodeURIComponent(txt); }

    window.onload = async function() {
        const params = new URLSearchParams(window.location.search);
        const item = params.get('item');
        if (!item) { document.getElementById('loader').innerText = "ID Error"; return; }
        document.getElementById('display-id').innerText = item;

        let uid = "";
        try {
            await liff.init({ liffId: "2009771327-tpjaCzG9" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                uid = profile.userId;
            }
        } catch (e) { console.error("LIFF取得失敗", e); }

        try {
            const res = await fetch(`${GAS_URL}?type=getSettings&item=${item}&userId=${uid}`);
            const data = await res.json();
            
            // スタンプ表示制御
            const count = data.stamps || 0;
            document.getElementById('stamp-count-text').innerText = `累計 ${count}回`;
            if (count >= 3) document.getElementById('st-fire').classList.add('visible');
            if (count >= 7) document.getElementById('st-crown').classList.add('visible');
            const rank = count >= 7 ? "ゴールド" : count >= 3 ? "ブロンズ" : "ビギナー";
            document.getElementById('rank-name').innerText = rank;

            // ② ボタンの割り当て：LIFF URL形式に修正
            data.buttons.forEach((btn, i) => {
                const el = document.getElementById(`slot-${i}`);
                if (el) {
                    if (btn.name !== "未設定" && btn.id) {
                        el.classList.add('active');
                        el.querySelector('.label').innerHTML = `${btn.name}<span class="sub-label">飲んだらタップ</span>`;
                        // 既存の登録済みリンク
                        el.onclick = () => window.location.href = `${LIFF_URL}?item=${btn.id}`;
                    } else {
                        el.querySelector('.label').innerText = "+新規登録";
                        el.style.opacity = "0.5";
                        // 新規登録用リンク（親ID_newN という形式で子IDを発行）
                        el.onclick = () => window.location.href = `${LIFF_URL}?item=${item}_new${i}`;
                    }
                }
            });
        } catch (e) { console.error(e); }
        finally { document.getElementById('loader').style.display = "none"; startAds(); }
    };

    function startAds() {
        const ads = document.querySelectorAll('.ad-banner');
        let cur = 0;
        if (ads.length < 2) return;
        setInterval(() => {
            ads[cur].classList.remove('active');
            cur = (cur + 1) % ads.length;
            ads[cur].classList.add('active');
        }, 4000);
    }
</script>
</body>
</html>
