<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマート管理カード - ろぎーシールHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00a86b;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --empty-color: #bdc3c7;
            --accent-blue: #3498db;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1c1e;
                --card-bg: #2d2f31;
                --text-main: #f1f2f6;
            }
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        .card-id-badge {
            background-color: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 { font-size: 1.1rem; margin: 0; }
        p { font-size: 0.75rem; opacity: 0.8; margin-top: 5px; }

        /* メインの5スロット（グリッド） */
        .card-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        /* 5つ目のスロットを横長にする */
        .menu-item.slot-5 {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 80px;
        }

        /* アクションボタン（相談・処方箋） */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: 0.2s;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid transparent;
        }

        /* スロット用（正方形） */
        .slot { aspect-ratio: 1 / 1; }

        /* 下段アクション用（横長） */
        .action-btn {
            flex-direction: row;
            gap: 15px;
            height: 70px;
            border-left: 5px solid var(--primary-color);
        }

        .menu-item.active { border-color: rgba(0,168,107,0.1); }
        .menu-item.empty { 
            border: 2px dashed var(--empty-color); 
            background-color: transparent; 
            box-shadow: none;
        }

        .menu-item:active { transform: scale(0.96); }

        .icon { font-size: 2rem; }
        .action-btn .icon { font-size: 1.5rem; }
        .label { font-size: 0.85rem; font-weight: bold; }
        .sub-label { font-size: 0.65rem; color: var(--empty-color); margin-top: 2px; }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: var(--empty-color);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="card-id-badge">CARD ID: <span id="display-id">----</span></div>
        <h1>スマート管理メニュー</h1>
        <p>かざして、えらんで、健康を記録。</p>
    </header>

    <div class="card-menu-grid" id="menu-container">
        <a href="javascript:void(0);" onclick="handleAction('slot1')" class="menu-item slot active">
            <span class="icon">☀️</span>
            <span class="label">朝の薬</span>
        </a>
        <a href="javascript:void(0);" onclick="handleAction('slot2')" class="menu-item slot active">
            <span class="icon">💊</span>
            <span class="label">ビタミンC</span>
        </a>
        <div class="menu-item slot empty">
            <span class="icon" style="opacity: 0.3;">➕</span>
            <span class="label" style="color:#bdc3c7;">未設定</span>
        </div>
        <div class="menu-item slot empty">
            <span class="icon" style="opacity: 0.3;">➕</span>
            <span class="label" style="color:#bdc3c7;">未設定</span>
        </div>
        <a href="javascript:void(0);" onclick="handleAction('slot5')" class="menu-item slot-5 active">
            <span class="icon" style="font-size: 1.5rem; margin-right: 10px;">🌙</span>
            <span class="label">夜の薬（就寝前）</span>
        </a>
    </div>

    <div class="action-container">
        <a href="javascript:void(0);" onclick="sendSupport('consult')" class="menu-item action-btn">
            <span class="icon">💬</span>
            <div style="text-align: left;">
                <div class="label">薬剤師に相談する</div>
                <div class="sub-label">薬や健康の悩みをLINEで直接相談</div>
            </div>
        </a>
        <a href="javascript:void(0);" onclick="sendSupport('rx')" class="menu-item action-btn" style="border-left-color: var(--accent-blue);">
            <span class="icon">📄</span>
            <div style="text-align: left;">
                <div class="label">薬を受け取る（処方箋送信）</div>
                <div class="sub-label">スマホで撮って送るだけで調剤予約</div>
            </div>
        </a>
    </div>

    <footer>
        &copy; 2026 ろぎーシール Project
    </footer>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const cardId = urlParams.get('item') || '1000';
    document.getElementById('display-id').innerText = cardId;

    const lineId = "@534uoyka";

    function handleAction(slotId) {
        alert("スロット [" + slotId + "] の記録をGASへ送信します。");
    }

    function sendSupport(type) {
        let message = "";
        if(type === 'rx') message = "【処方箋送信】画像の添付をお願いします。";
        if(type === 'consult') message = "【健康相談】お気軽にご入力ください。";
        
        window.location.href = `https://line.me/R/oaMessage/${lineId}/?${encodeURIComponent(message)}`;
    }
</script>

</body>
</html>
