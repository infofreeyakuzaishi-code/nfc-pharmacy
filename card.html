<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマート管理カード - ろぎーシールHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00a86b;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --empty-color: #bdc3c7;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1c1e;
                --card-bg: #2d2f31;
                --text-main: #f1f2f6;
            }
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-id-badge {
            background-color: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 { font-size: 1.1rem; margin: 0; }
        p { font-size: 0.8rem; opacity: 0.8; margin-top: 5px; }

        /* 5つのボタン配置用グリッド */
        .card-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2列 */
            gap: 15px;
        }

        /* 5つ目のボタンだけ横いっぱいに広げる設定 */
        .menu-item:last-child {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 100px;
        }

        .menu-item {
            aspect-ratio: 1 / 1;
            background-color: var(--card-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 2px solid transparent;
            transition: 0.2s;
            padding: 10px;
        }

        /* 設定済みボタン */
        .menu-item.active {
            border-color: rgba(0,168,107,0.2);
        }

        /* 未設定ボタン */
        .menu-item.empty {
            border: 2px dashed var(--empty-color);
            background-color: transparent;
            box-shadow: none;
        }

        .menu-item:active { transform: scale(0.95); }

        .icon { font-size: 2.2rem; margin-bottom: 8px; }
        .label { font-size: 0.85rem; font-weight: bold; }
        .empty-text { font-size: 0.7rem; color: var(--empty-color); margin-top: 5px; }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: var(--empty-color);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="card-id-badge">ID: <span id="display-id">----</span></div>
        <h1>管理カードメニュー</h1>
        <p>ボタンを押して記録・相談をしてください</p>
    </header>

    <div class="card-menu-grid" id="menu-container">
        <a href="javascript:void(0);" onclick="handleAction('0001')" class="menu-item active">
            <span class="icon">☀️</span>
            <span class="label">朝の薬</span>
        </a>

        <a href="javascript:void(0);" onclick="handleAction('0002')" class="menu-item active">
            <span class="icon">💊</span>
            <span class="label">ビタミンC</span>
        </a>

        <div class="menu-item empty">
            <span class="icon" style="opacity: 0.3;">➕</span>
            <span class="label" style="color: #bdc3c7;">未設定</span>
            <span class="empty-text">タップして登録</span>
        </div>

        <div class="menu-item empty">
            <span class="icon" style="opacity: 0.3;">➕</span>
            <span class="label" style="color: #bdc3c7;">未設定</span>
        </div>

        <a href="javascript:void(0);" onclick="handleAction('consult')" class="menu-item active">
            <span class="icon" style="font-size: 1.8rem;">💬</span>
            <span class="label">薬剤師に相談する</span>
        </a>
    </div>

    <footer>
        &copy; 2026 ろぎーシール Project
    </footer>
</div>

<script>
    // URLから?item=1001を取得して表示に反映
    const urlParams = new URLSearchParams(window.location.search);
    const cardId = urlParams.get('item') || '1000';
    document.getElementById('display-id').innerText = cardId;

    function handleAction(itemId) {
        // ここにGAS連携やLINE送信の処理が入ります
        alert("アイテムID [" + itemId + "] を実行します。\n(実際にはここにLINE送信やGAS記録が入ります)");
    }
</script>

</body>
</html>
